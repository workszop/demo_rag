<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --border: #e8e8e8;
      --text: #1a1a1a;
      --text-secondary: #6b7280;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --accent-hover: #1d4ed8;
      --success: #059669;
      --success-light: #ecfdf5;
      --error: #dc2626;
      --error-light: #fef2f2;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --transition: 0.2s ease;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 500px;
      margin: 0 auto;
    }

    /* Cards / Sections */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }

    /* Inputs */
    input[type="text"], textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
      background: var(--surface);
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    textarea { resize: vertical; min-height: 80px; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }

    .form-group { margin-bottom: 14px; }
    .form-group:last-child { margin-bottom: 0; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg); }

    .btn-sm {
      padding: 6px 14px;
      font-size: 0.8rem;
    }

    /* Document grid */
    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }
    .doc-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .doc-card.highlighted {
      border-color: var(--success);
      box-shadow: 0 0 0 2px rgba(5, 150, 105, 0.15);
    }
    .doc-card h4 {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .doc-card .doc-preview {
      font-size: 0.8rem;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .doc-card .embedding-preview {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--text-secondary);
      background: var(--surface);
      padding: 4px 8px;
      border-radius: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .doc-card .user-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 500;
      background: var(--accent-light);
      color: var(--accent);
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
    }

    /* Query section */
    .query-row {
      display: flex;
      gap: 10px;
    }
    .query-row input { flex: 1; }

    /* Threshold */
    .threshold-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 14px;
    }
    .threshold-row label { margin: 0; white-space: nowrap; }
    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .threshold-value {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      min-width: 36px;
      text-align: right;
    }

    /* Simulation steps */
    .steps-container { display: flex; flex-direction: column; gap: 2px; }
    .step {
      border-radius: var(--radius-sm);
      overflow: hidden;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .step.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      user-select: none;
    }
    .step-header:hover { background: var(--bg); }
    .step-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-number.done { background: var(--success); }
    .step-title {
      font-size: 0.85rem;
      font-weight: 500;
      flex: 1;
    }
    .step-chevron {
      font-size: 0.7rem;
      color: var(--text-secondary);
      transition: transform var(--transition);
    }
    .step.open .step-chevron { transform: rotate(90deg); }
    .step-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .step.open .step-body {
      max-height: 800px;
    }
    .step-content {
      padding: 12px 16px 16px 50px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    .step-content pre {
      background: var(--bg);
      padding: 12px;
      border-radius: var(--radius-sm);
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      overflow-x: auto;
      white-space: pre-wrap;
      margin: 8px 0;
    }
    .step-content .result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .step-content .result-item:last-child { border-bottom: none; }
    .score-badge {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .score-high { background: var(--success-light); color: var(--success); }
    .score-mid { background: #fef3c7; color: #92400e; }
    .score-low { background: var(--error-light); color: var(--error); }

    /* Final answer */
    .final-answer {
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      padding: 16px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.7;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      z-index: 100;
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error { background: var(--error); color: #fff; }

    /* Connector line between steps */
    .step-connector {
      width: 2px;
      height: 8px;
      background: var(--border);
      margin-left: 27px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .container { padding: 24px 16px 60px; }
      header h1 { font-size: 1.5rem; }
      .query-row { flex-direction: column; }
      .doc-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>RAG Simulator</h1>
      <p>Interaktywny symulator Retrieval-Augmented Generation.</p>
    </header>

    <!-- Add Document -->
    <div class="card">
      <div class="card-title">Dodaj dokument</div>
      <div class="form-group">
        <label for="new-doc-title">Tytuł (opcjonalnie)</label>
        <input type="text" id="new-doc-title" placeholder="Np. Regulamin firmy">
      </div>
      <div class="form-group">
        <label for="new-doc-content">Treść</label>
        <textarea id="new-doc-content" placeholder="Wklej lub wpisz treść dokumentu..."></textarea>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addNewDocument()">Dodaj i zwektoryzuj</button>
    </div>

    <!-- Knowledge Base -->
    <div class="card">
      <div class="card-title">Baza wiedzy</div>
      <div class="doc-grid" id="doc-grid"></div>
    </div>

    <!-- Query -->
    <div class="card">
      <div class="card-title">Zapytanie</div>
      <div class="query-row">
        <input type="text" id="user-query" placeholder="Np. Jakie są godziny otwarcia biura?" onkeydown="if(event.key==='Enter') runRAG()">
        <button class="btn btn-primary" id="run-btn" onclick="runRAG()">Uruchom RAG</button>
      </div>
      <div class="threshold-row">
        <label>Próg podobieństwa</label>
        <input type="range" id="threshold" min="0" max="100" step="5" value="35" oninput="document.getElementById('threshold-val').textContent=this.value+'%'">
        <span class="threshold-value" id="threshold-val">35%</span>
      </div>
    </div>

    <!-- Simulation Steps -->
    <div class="card" id="results-card" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:0;">Przebieg RAG</div>
        <button class="btn btn-secondary btn-sm" onclick="resetSimulation()">Resetuj</button>
      </div>
      <div class="steps-container" id="steps-container"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    /* ============ STATE ============ */
    const INITIAL_DOCS = [
      { id: "doc1", title: "Regulamin Biura", content: "Godziny otwarcia biura to 9:00 - 17:00 od poniedziałku do piątku. W weekendy biuro jest nieczynne.", keywords: ["godziny", "otwarcia", "biuro", "czynne", "weekend"] },
      { id: "doc2", title: "Polityka Pracy Zdalnej", content: "Pracownicy mogą pracować zdalnie przez 2 dni w tygodniu po uzgodnieniu z przełożonym. Wymagane jest stabilne połączenie internetowe.", keywords: ["praca", "zdalna", "zdalnie", "home office", "internet"] },
      { id: "doc3", title: "Procedura Urlopowa", content: "Wniosek urlopowy należy złożyć co najmniej 2 tygodnie przed planowanym terminem przez system HR. Maksymalny jednorazowy urlop to 14 dni.", keywords: ["urlop", "wniosek", "termin", "system hr", "wolne"] },
      { id: "doc4", title: "Kontakt IT", content: "W razie problemów technicznych prosimy o kontakt z działem IT pod adresem it-support@example.com lub telefonicznie 123-456-789.", keywords: ["it", "pomoc", "techniczne", "kontakt", "support", "telefon", "email"] },
      { id: "doc5", title: "Benefity Pracownicze", content: "Firma oferuje kartę Multisport, prywatną opiekę medyczną oraz dofinansowanie do okularów. Szczegóły w intranecie.", keywords: ["benefity", "multisport", "opieka medyczna", "okulary", "dofinansowanie"] }
    ];

    let docs = INITIAL_DOCS.map(d => ({ ...d }));
    let embeddings = {};  // id -> float[] (real) or string (simulated)
    let userDocCounter = 0;
    let isRunning = false;

    /* ============ SIMULATION ============ */
    function seededRandom(seed) {
      let s = seed % 2147483647;
      if (s <= 0) s += 2147483646;
      return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
    }

    function simEmbed(text) {
      let hash = 0;
      for (let i = 0; i < text.length; i++) { hash = text.charCodeAt(i) + ((hash << 5) - hash); hash |= 0; }
      const rng = seededRandom(Math.abs(hash) || 1);
      const dims = 8;
      const vec = [];
      for (let i = 0; i < dims; i++) vec.push(rng() * 2 - 1);
      return vec;
    }

    function simKeywordScore(query, doc) {
      const qWords = query.toLowerCase().match(/\b(\w+)\b/g)?.filter(w => w.length > 2) || [];
      if (qWords.length === 0) return 0;
      const contentLower = doc.content.toLowerCase();
      const terms = new Set(doc.keywords?.length ? doc.keywords : (contentLower.match(/\b(\w+)\b/g) || []));
      let score = 0;
      qWords.forEach(qw => {
        if (terms.has(qw)) score += 1;
        else if (contentLower.includes(qw)) score += 0.5;
        terms.forEach(t => { if (t.includes(qw) || qw.includes(t)) score += 0.2; });
      });
      return Math.min(score / Math.max(qWords.length, 1), 1);
    }

    function simLLM(context, query) {
      if (!context) return `Nie znaleziono dokumentów spełniających próg podobieństwa dla zapytania "${query}".`;
      const cl = context.toLowerCase();
      if (cl.includes("godziny otwarcia")) return "Biuro jest otwarte od 9:00 do 17:00, od poniedziałku do piątku. W weekendy biuro jest nieczynne.";
      if (cl.includes("pracować zdalnie")) return "Praca zdalna jest możliwa przez 2 dni w tygodniu po uzgodnieniu z przełożonym. Wymagane jest stabilne połączenie internetowe.";
      if (cl.includes("wniosek urlopowy")) return "Wniosek urlopowy składa się przez system HR minimum 2 tygodnie przed planowanym terminem. Maksymalny jednorazowy urlop to 14 dni.";
      if (cl.includes("kontakt z działem it")) return "Dział IT jest dostępny pod adresem it-support@example.com lub telefonicznie: 123-456-789.";
      if (cl.includes("multisport") || cl.includes("opiekę medyczną")) return "Firma oferuje kartę Multisport, prywatną opiekę medyczną i dofinansowanie do okularów. Szczegóły w intranecie.";
      return `Na podstawie znalezionych dokumentów: ${context.substring(0, 200)}...`;
    }

    /* ============ VECTOR MATH ============ */
    function cosineSim(a, b) {
      if (!a || !b || a.length !== b.length) return 0;
      let dot = 0, na = 0, nb = 0;
      for (let i = 0; i < a.length; i++) { dot += a[i] * b[i]; na += a[i] * a[i]; nb += b[i] * b[i]; }
      const denom = Math.sqrt(na) * Math.sqrt(nb);
      return denom === 0 ? 0 : dot / denom;
    }

    function formatVec(vec) {
      if (!Array.isArray(vec)) return "[...]";
      const show = vec.slice(0, 4).map(v => v.toFixed(3));
      return `[${show.join(", ")}, ...]`;
    }

    /* ============ EMBEDDINGS ============ */
    function initEmbeddings() {
      docs.forEach(d => { embeddings[d.id] = simEmbed(d.content); });
      renderDocs();
    }

    /* ============ DOCUMENT MANAGEMENT ============ */
    function addNewDocument() {
      const titleEl = document.getElementById('new-doc-title');
      const contentEl = document.getElementById('new-doc-content');
      const content = contentEl.value.trim();
      if (!content) { toast("Treść dokumentu nie może być pusta.", true); return; }
      userDocCounter++;
      const title = titleEl.value.trim() || `Dokument ${userDocCounter}`;
      const newDoc = { id: `user_${userDocCounter}`, title, content, keywords: [] };
      docs.push(newDoc);
      embeddings[newDoc.id] = simEmbed(content);
      titleEl.value = "";
      contentEl.value = "";
      renderDocs();
      toast(`Dodano "${title}"`);
    }

    function renderDocs() {
      const grid = document.getElementById('doc-grid');
      grid.innerHTML = docs.map(d => {
        const isUser = d.id.startsWith('user_');
        const isHighlighted = document.querySelector(`.doc-card[data-id="${d.id}"]`)?.classList.contains('highlighted');
        return `<div class="doc-card${isHighlighted ? ' highlighted' : ''}" data-id="${d.id}">
          <h4>${d.title}${isUser ? '<span class="user-badge">własny</span>' : ''}</h4>
          <div class="doc-preview">${d.content}</div>
          <div class="embedding-preview">${formatVec(embeddings[d.id])}</div>
        </div>`;
      }).join('');
    }

    /* ============ RAG PIPELINE ============ */
    async function runRAG() {
      if (isRunning) return;
      const query = document.getElementById('user-query').value.trim();
      if (!query) { toast("Wpisz zapytanie.", true); return; }

      isRunning = true;
      const btn = document.getElementById('run-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Przetwarzam...';

      const threshold = parseFloat(document.getElementById('threshold').value) / 100;
      const resultsCard = document.getElementById('results-card');
      resultsCard.style.display = 'block';
      const stepsEl = document.getElementById('steps-container');
      stepsEl.innerHTML = '';

      // Clear doc highlights
      document.querySelectorAll('.doc-card').forEach(c => c.classList.remove('highlighted'));

      try {
        // Step 1: Query
        addStep(stepsEl, 1, "Zapytanie", `<p>${escHtml(query)}</p>`, true);
        await sleep(400);

        // Step 2: Query embedding
        const queryVec = simEmbed(query);
        addStep(stepsEl, 2, "Embedding zapytania", `<pre>${formatVec(queryVec)}</pre><p>Wymiary wektora: ${queryVec.length}</p>`, true);
        await sleep(400);

        // Step 3: Vector search
        let results = docs.map(d => {
          const cos = Math.max(0, (cosineSim(queryVec, embeddings[d.id]) + 1) / 2);
          const kw = simKeywordScore(query, d);
          return { ...d, score: kw * 0.6 + cos * 0.4 };
        });
        results.sort((a, b) => b.score - a.score);

        const searchHtml = results.slice(0, 5).map(r => {
          const pct = (r.score * 100).toFixed(1);
          const cls = r.score >= 0.5 ? 'score-high' : r.score >= 0.2 ? 'score-mid' : 'score-low';
          return `<div class="result-item">
            <span style="flex:1;font-weight:500;">${escHtml(r.title)}</span>
            <span class="score-badge ${cls}">${pct}%</span>
          </div>`;
        }).join('');
        addStep(stepsEl, 3, "Wyszukiwanie wektorowe", searchHtml, true);
        await sleep(400);

        // Step 4: Retrieved docs
        const retrieved = results.filter(r => r.score >= threshold).slice(0, 3);
        retrieved.forEach(r => {
          const card = document.querySelector(`.doc-card[data-id="${r.id}"]`);
          if (card) card.classList.add('highlighted');
        });

        const retHtml = retrieved.length > 0
          ? retrieved.map(r => `<div style="margin-bottom:10px;">
              <strong>${escHtml(r.title)}</strong> <span class="score-badge score-high">${(r.score*100).toFixed(1)}%</span>
              <p style="margin-top:4px;color:var(--text-secondary);">${escHtml(r.content)}</p>
            </div>`).join('')
          : '<p>Żaden dokument nie spełnił progu podobieństwa.</p>';
        addStep(stepsEl, 4, "Odzyskane dokumenty", retHtml, true);
        await sleep(400);

        // Step 5: Augmented prompt
        const context = retrieved.map(r => r.content).join("\n\n");
        const augPrompt = `Kontekst:\n${context || "(brak)"}\n\nPytanie: ${query}`;
        addStep(stepsEl, 5, "Rozszerzony prompt", `<pre>${escHtml(augPrompt)}</pre>`, true);
        await sleep(400);

        // Step 6: Generate answer
        const answer = simLLM(context, query);
        addStep(stepsEl, 6, "Odpowiedź", `<div class="final-answer">${escHtml(answer)}</div>`, true, true);

      } catch (e) {
        toast("Wystąpił błąd: " + e.message, true);
        console.error(e);
      }

      btn.disabled = false;
      btn.innerHTML = 'Uruchom RAG';
      isRunning = false;
    }

    function addStep(container, num, title, contentHtml, open = false, isFinal = false) {
      const div = document.createElement('div');
      div.className = `step${open ? ' open' : ''}`;
      div.innerHTML = `
        ${container.children.length > 0 ? '<div class="step-connector"></div>' : ''}
        <div class="step-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="step-number${isFinal ? ' done' : ''}">${num}</span>
          <span class="step-title">${title}</span>
          <span class="step-chevron">&#9654;</span>
        </div>
        <div class="step-body"><div class="step-content">${contentHtml}</div></div>
      `;
      container.appendChild(div);
      // Animate in
      requestAnimationFrame(() => { requestAnimationFrame(() => { div.classList.add('visible'); }); });
    }

    function resetSimulation() {
      document.getElementById('results-card').style.display = 'none';
      document.getElementById('steps-container').innerHTML = '';
      document.querySelectorAll('.doc-card').forEach(c => c.classList.remove('highlighted'));
    }

    /* ============ UTILS ============ */
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function toast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${isError ? 'error' : 'success'} show`;
      setTimeout(() => { el.classList.remove('show'); }, 3000);
    }

    /* ============ INIT ============ */
    initEmbeddings();
  </script>
</body>
</html>
